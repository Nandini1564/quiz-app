<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 class="title">JavaScript Quiz App</h1>
<p class="subtitle">Test your knowledge and improve skills 🚀</p>

    <div id="quiz-box">

      <h2 id="question"></h2>

      <div id="options"></div>

      <button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>

    </div>

    <h2 id="result"></h2>
    <button id="restartBtn" onclick="restartQuiz()" style="display:none;">
      Restart Quiz
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
